<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Search</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="page">
    <form class="form">
      <label class="search-label">
        <input class="search-input" type="text" name="search-text" placeholder="Search images..." autocomplete="off" />
      </label>
      <button class="search-btn" type="submit">Search</button>
    </form>

    <ul class="gallery"></ul>

    <button class="load-more is-hidden" type="button">Load more</button>

    <div class="loader">Loading images, please wait...</div>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
